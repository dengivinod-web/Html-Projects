<h1>JOB APPLICATION SUBMISSION FORM</h1>
<form>
	<label> Enter your First Name:</label>
	<input type="text" placeholder="Enter First Name"><br><br>

	<label>Enter your Email:</label>

	<label>Enter your DOB:</label>
	<input type="date"  placeholder="Enter youe DOB"><br><br>

       	<label>Enter your Gender:</label>

	<label>Enter your skill:</label>

	<option>India</option>
	<option>Japan</option>
	<option>America</option>
	<option>Brazill</option>
	<option>koria</option>
	</select><br><br>

	<label>Upload your Resume:</label>
	<input type="file"><br><br><br>
	
	<input type="button" value="submit"> &nbsp &nbsp &nbsp &nbsp &nbsp &nbsp &nbsp &nbsp &nbsp &nbsp &nbsp &nbsp &nbsp &nbsp &nbsp &nbsp &nbsp &nbsp &nbsp
