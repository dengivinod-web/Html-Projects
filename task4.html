<html>
<head>
	<title>Job application</title>
<script>
  function data()
     {

	var d=document.getElementById("n4").value;

	var f=document.getElementById("n6").value;

	var i=document.getElementById("n9").value;


        if(a==""||b==""||c==""||d==""||e==""||f==""||g==""||h==""||i=="")
	{
	   alert("Fill the form properly");
           return false;
	}
       	else if(c!=d)
	{
	   alert("Enter same password");
           return false;
	}
	else if(e.length>10||e.length<10)
	{
	   alert("Number must be 10 digits ! Enter a valid numbers");
           return false;
	}
	else if(isNaN(e))
	{
	   alert("Only numbers are allowed ! Enter a valid numbers");
           return false;
	}

        else
	{
		true;
	}
    }
</script>
</head>
<body>

       	<label>Enter your Gender:</label>
