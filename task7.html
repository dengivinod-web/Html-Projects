<html>
<head>
	<title>Contact us page</title>
</head>
<body>
<form>
	<h1>Contact us</h1>
	<p><b>Please fill out the form below to get in touch with you</b></p>
	<form action="" method="post">
	<label>Enter your Name:</label>
	<input type="text" placeholder="Enter your Full Name" required><br><br>

	<label>Enter your email:</label>
	<input type="email" placeholder="Enter your Email" required><br><br>

	<label>Enter your subject:</label>
	<select>
	<option>Subjects</option>
	<option>General Enquiry</option>
	<option>Technical Support</option>
	<option>Feedback</option>
	</select><br><br>

	<textarea name="message" placeholder="Enter your message here...." rows="5" cols="20" required></textarea><br><br>

	<input type="submit" value="Send message"> &nbsp &nbsp &nbsp &nbsp &nbsp &nbsp &nbsp &nbsp 
	<input type="reset" value="Clear Form">
</form>


</body>
</html>
